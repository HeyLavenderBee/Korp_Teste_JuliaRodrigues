<app-header></app-header>
<main>
    <h1>Criar Produto</h1>
    <form (ngSubmit)="addProduct(qtyInput)" class="product-form">
        <label for="nome">Descrição do produto</label>
        <input class="text-input" type="text" id="nome" placeholder="Descrição do produto" name="nome" [(ngModel)]="newProduct.descricao" required><br>
        <label for="saldo">Saldo</label>
        <input class="text-input" type="number" id="saldo" placeholder="Saldo" min="0" name="saldo" #qtyInput [(ngModel)]="newProduct.saldo" required><br>
        <button class="button" type="submit">Cadastrar Produto</button>
    </form>
</main>
